name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Clean workspace
        run: git clean -xfd

      - uses: actions/setup-node@v6
        with:
          # Match the engines floor from package.json so we test against the
          # oldest signalk-server users will be on. Anything newer that we'd
          # rely on accidentally would fail here before reaching the registry.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm install --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build:all

      - name: Test
        run: npm test

      - name: Pack and verify --ignore-scripts install
        # Verify the tarball that's about to be published actually installs
        # under --ignore-scripts (which is how the SignalK Appstore installs
        # plugins). Catches missing files[] entries, native deps in runtime
        # dependencies, anything else that would silently break the user.
        # Uses dynamic import() since the plugin is type: "module" — that's
        # the canonical loader for ESM and doesn't depend on the require(esm)
        # implementation that varies across Node minors.
        run: |
          npm pack
          mkdir -p /tmp/ssl-pack-smoke
          cd /tmp/ssl-pack-smoke
          npm init -y >/dev/null
          npm install --ignore-scripts "$GITHUB_WORKSPACE"/signalk-ssl-*.tgz
          node --input-type=module -e "const m=await import('signalk-ssl');const c=m.default??m;const p=c({debug:()=>{},error:()=>{},getDataDirPath:()=>'/tmp/ssl-pack-smoke'});if(p.id!=='signalk-ssl')process.exit(1);console.log('tarball ok: '+p.id);"

      - name: Publish
        run: |
          if [[ "${{ github.ref }}" == refs/tags/*-beta.* ]] || [[ "${{ github.ref }}" == refs/tags/*-rc.* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
